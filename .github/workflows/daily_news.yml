name: 每日全球热点爬取

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 运行爬虫
        run: python3 crawl_global_news.py

      - name: 提交报告
        run: |
          git config --local user.name "GitHub Actions"
          git config --local user.email "actions@github.com"
          git add *.md *.json
          git diff --staged --quiet || git commit -m "每日报告 $(date +%Y-%m-%d)"
          git push
